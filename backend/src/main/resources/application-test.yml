spring:
  datasource:
    url: jdbc:h2:mem:opscontrolplane;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    database-platform: org.hibernate.dialect.H2Dialect
  kafka:
    bootstrap-servers: ${spring.embedded.kafka.brokers:localhost:9092}

app:
  jwt:
    secret: test-only-secret-key-for-junit-tests-not-used-in-production-1234567890
    expiration-ms: 3600000
  simulator:
    enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

logging:
  level:
    root: INFO
    com.opscontrolplane: DEBUG
