server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Static assets: cache aggressively, they're content-hashed by Vite.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback: let React Router handle client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # This frontend talks directly to VITE_API_URL (baked in at build time),
    # so no reverse proxy is required for the default deployment.
    #
    # If you prefer a same-origin deployment (frontend and backend served
    # from one hostname), uncomment and adjust the block below, then set
    # VITE_API_URL=/api at build time:
    #
    # location /api/ {
    #     proxy_pass http://backend:8080/api/;
    #     proxy_http_version 1.1;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
}
