services:
  postgres:
    image: postgres:16
    container_name: ops-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-opscontrolplane}
      POSTGRES_USER: ${POSTGRES_USER:-ops_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ops_password}
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ops_user} -d ${POSTGRES_DB:-opscontrolplane}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ops-net

  # Single-node Kafka running in KRaft mode (no ZooKeeper required), using
  # the official Apache Kafka image (the bitnami/kafka image this project
  # originally targeted was pulled from Docker Hub's free catalog in 2025).
  kafka:
    image: apache/kafka:3.7.0
    container_name: ops-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: controller,broker
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      CLUSTER_ID: "b3NDb250cm9sUGxhbmVLcmFmdA"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - ops-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ops-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      # These map directly to backend/src/main/resources/application.yml
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${POSTGRES_DB:-opscontrolplane}
      DB_USER: ${POSTGRES_USER:-ops_user}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-ops_password}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-super-secret-key}
    ports:
      - "8080:8080"
    networks:
      - ops-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8080/api}
    container_name: ops-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3100:80"
    networks:
      - ops-net

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: ops-prometheus
    restart: unless-stopped
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - backend
    networks:
      - ops-net

  grafana:
    image: grafana/grafana:10.4.0
    container_name: ops-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - ops-net

  # ---------------------------------------------------------------------
  # Optional ELK stack for centralized log viewing.
  # Enable with: docker compose --profile elk up
  #
  # NOTE: Full Filebeat/Logstash log-shipping wiring is intentionally out
  # of scope for this portfolio repo. The backend is expected to emit
  # structured JSON logs to stdout (see README "Kibana / Logging" section
  # for the documented log shape). To ship those logs into this stack you
  # would normally add a Filebeat sidecar/DaemonSet tailing the container
  # log files and forwarding to Logstash or directly to Elasticsearch.
  #
  # A lightweight local alternative that requires no extra services:
  #   docker logs -f ops-backend | jq .
  # ---------------------------------------------------------------------
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: ops-elasticsearch
    restart: unless-stopped
    profiles: ["elk"]
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - ops-net

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    container_name: ops-kibana
    restart: unless-stopped
    profiles: ["elk"]
    environment:
      ELASTICSEARCH_HOSTS: '["http://elasticsearch:9200"]'
    depends_on:
      - elasticsearch
    ports:
      - "5601:5601"
    networks:
      - ops-net

networks:
  ops-net:
    driver: bridge

volumes:
  postgres-data:
  kafka-data:
  prometheus-data:
  grafana-data:
  elasticsearch-data:
